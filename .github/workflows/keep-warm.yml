name: Keep app warm

# Render's free tier spins the instance down after ~15 min of no traffic,
# causing the next real request to cold-start (slow, and can 502 under a
# concurrent burst). Pinging well under that threshold keeps it warm.
#
# Note: GitHub disables scheduled workflows automatically after 60 days
# with no repo activity. Any push/commit resets that clock, so normal
# maintenance keeps this alive - if the repo goes fully dormant for two
# months, re-enable it from the Actions tab.

"on":
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sS -m 15 --fail https://wine-circle-app.onrender.com/api/health
